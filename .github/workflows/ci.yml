name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: install sqlite3 (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y sqlite3
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race -count=1 ./...

  goreleaser-snapshot:
    name: goreleaser snapshot (linux)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: build artifacts
        run: |
          mkdir -p dist
          for goos in linux darwin; do
            for goarch in amd64 arm64; do
              CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch go build \
                -trimpath -ldflags "-s -w" \
                -o "dist/excise-${goos}-${goarch}" ./cmd/excise
            done
          done
          ls -la dist
      - uses: actions/upload-artifact@v4
        with:
          name: excise-snapshots
          path: dist/excise-*
          retention-days: 7
